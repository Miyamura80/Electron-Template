model_name: gemini/gemini-3-flash-preview
dot_global_config_health_check: true
dev_env: dev

########################################################
# Main window
########################################################
window:
  title: Electron-Template
  width: 800
  height: 600
  min_width: 480
  min_height: 360

example_parent:
  example_child: "example_value"

########################################################
# LLMs
########################################################
default_llm:
  default_model: gemini/gemini-3-flash-preview
  fallback_model: gemini/gemini-2.5-flash-preview
  default_temperature: 0.5
  default_max_tokens: 100000

llm_config:
  cache_enabled: false
  retry:
    max_attempts: 3
    min_wait_seconds: 1
    max_wait_seconds: 5

########################################################
# Analytics (PostHog)
########################################################
posthog:
  enabled: false
  # Override host for EU residency: https://eu.i.posthog.com
  host: "https://us.i.posthog.com"
  # How many ms of events to batch before flushing
  flush_at_ms: 30000
  flush_interval_ms: 30000

########################################################
# Feature flags
########################################################
features:
  # Add feature flags here. Can be overridden by env vars: FEATURES__NEW_UI=true
  new_ui: false
  beta_features: false
  enable_llm_fallback: true

########################################################
# Logging
########################################################
logging:
  verbose: false
  format:
    show_time: false
    show_session_id: true
    location:
      enabled: true
      show_file: true
      show_function: true
      show_line: true
      show_for_info: false
      show_for_debug: true
      show_for_warning: true
      show_for_error: true
  levels:
    debug: false
    info: true
    warning: true
    error: true
    critical: true
  redaction:
    enabled: true
    use_default_pii: true
    patterns:
      - name: "ANTHROPIC_API_KEY"
        regex: "sk-ant-[a-zA-Z0-9-]{20,}"
        placeholder: "[REDACTED_API_KEY]"
      - name: "OPENAI_API_KEY"
        regex: "sk-[a-zA-Z0-9]{20,}"
        placeholder: "[REDACTED_API_KEY]"
      - name: "STRIPE_API_KEY"
        regex: "[spr]k_(live|test)_[a-zA-Z0-9]{20,}"
        placeholder: "[REDACTED_API_KEY]"
      - name: "BEARER_TOKEN"
        regex: "Bearer\\s+[a-zA-Z0-9._\\-]{20,}"
        placeholder: "[REDACTED_BEARER_TOKEN]"
      - name: "POSTHOG_API_KEY"
        regex: "phc_[a-zA-Z0-9]{20,}"
        placeholder: "[REDACTED_API_KEY]"
      - name: "GENERIC_KEY"
        regex: "(?i:(?:api[_-]?key|project[_-]?key|secret[_-]?key)[=:\\s]+['\"]?[a-zA-Z0-9_\\-]{16,}['\"]?)"
        placeholder: "[REDACTED_KEY]"
