name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Package ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            package-script: package:linux
            artifact-glob: release/**/*
          - platform: mac
            os: macos-latest
            package-script: package:mac
            artifact-glob: release/**/*
          - platform: win
            os: windows-latest
            package-script: package:win
            artifact-glob: release/**/*
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI checks
        if: matrix.platform == 'linux'
        run: make ci

      - name: Run tests
        if: matrix.platform == 'linux'
        run: make test

      - name: Package application
        run: bun run ${{ matrix.package-script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact-glob }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
