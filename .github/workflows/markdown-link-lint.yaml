name: Markdown Link Validation

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight
  workflow_dispatch:

jobs:
  validate-links:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install

    - name: Validate links
      run: make lint_links
